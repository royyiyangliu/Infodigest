name: zz-curveto-dl-test (TEMP — safe to delete)

# 临时测试：验证 GitHub Actions 机房 IP 能否通过 resolve.curve.to 代理
# 下载完整的 Substack 音频（绕开 api.substack.com 的 IP 封锁）。用完即删。

on:
  push:
    branches: [claude/sweet-cannon-jmz1rq]
    paths: ['.github/workflows/zz-curveto-dl-test.yml']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Probe + full download via resolve.curve.to
        run: |
          set +e
          R="https://resolve.curve.to/resolve?url=https://api.substack.com/feed/podcast/202734201/6bfb394237f089ea0355b8632dfa3537.mp3"

          echo "===== runner egress IP ====="
          curl -sS --max-time 20 https://api.ipify.org ; echo

          echo "===== 1) 头部探测（前 1 字节）====="
          curl -sS --max-time 40 -D - -o /dev/null -r 0-0 "$R" 2>&1 | head -15

          echo "===== 2) 完整下载，校验大小/类型/文件头 ====="
          curl -sS --max-time 180 -L -o /tmp/ep.mp3 \
            -w "code=%{http_code} type=%{content_type} size=%{size_download} time=%{time_total}s\n" "$R"
          echo "--- file 类型判定 ---"
          file /tmp/ep.mp3
          echo "--- 期望 ~11470606 字节，实际： ---"
          stat -c '%s' /tmp/ep.mp3 2>/dev/null || wc -c < /tmp/ep.mp3

      - name: Python requests full download (mirrors pipeline.py download_file)
        run: |
          python3 - <<'PY'
          import requests
          R = ("https://resolve.curve.to/resolve?url="
               "https://api.substack.com/feed/podcast/202734201/6bfb394237f089ea0355b8632dfa3537.mp3")
          try:
              with requests.get(R, stream=True, timeout=180) as r:
                  total = 0
                  head = b""
                  for chunk in r.iter_content(1 << 16):
                      if not head: head = chunk[:4]
                      total += len(chunk)
                  print(f"[py] status={r.status_code} ctype={r.headers.get('content-type')} "
                        f"bytes={total} head={head!r}")
          except Exception as e:
              print(f"[py] ERROR {type(e).__name__}: {e}")
          PY
