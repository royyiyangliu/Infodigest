name: Daily Content Fetch

on:
  schedule:
    - cron: '0 17 * * *'   # 每天 17:00 UTC = 北京时间 01:00
  workflow_dispatch:         # 支持手动触发测试

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 -q

      - name: Run daily fetch
        run: python fetch.py

      - name: Transcribe self-scraped podcasts
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python transcribe_podcasts.py

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ digest.db
          if git diff --staged --quiet; then
            echo "今日无新内容，跳过提交。"
          else
            NFILES=$(git diff --staged --numstat | wc -l | tr -d ' ')
            git commit -m "fetch: $(date -u +%Y-%m-%d) (+${NFILES} files)"
            git push
          fi
