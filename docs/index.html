<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 信息日报</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
    background: #f5f6fa; color: #1a1a2e; line-height: 1.7;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff; padding: 48px 40px 36px; text-align: center;
  }
  header h1 { font-size: 32px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
  header p { font-size: 15px; color: #a0c4d8; }
  main { max-width: 720px; margin: 48px auto; padding: 0 24px; flex: 1; }
  h2 { font-size: 13px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
       color: #9ca3af; margin-bottom: 16px; }
  #list { list-style: none; }
  #list li {
    background: #fff; border: 1px solid #e8ecf4; border-radius: 10px;
    margin-bottom: 10px; transition: box-shadow .2s, border-color .2s;
  }
  #list li:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); border-color: #c8d6e8; }
  #list a {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; text-decoration: none; color: #1a3a5c;
  }
  #list a:hover { color: #1d6fa4; }
  .date { font-size: 16px; font-weight: 600; }
  .arrow { color: #c8d6e8; font-size: 18px; }
  #loading { color: #9ca3af; font-size: 14px; padding: 20px 0; }
  footer { text-align: center; padding: 24px; font-size: 12px; color: #adb5bd;
           border-top: 1px solid #e8ecf4; background: #fff; }
</style>
</head>
<body>
<header>
  <h1>AI 信息日报</h1>
  <p>播客 · 文章 · 产业动态 · 每日自动更新</p>
</header>
<main>
  <h2>历史存档</h2>
  <p id="loading">加载中…</p>
  <ul id="list"></ul>
</main>
<footer>
  AI Information Digest ·
  <a href="https://github.com/royyiyangliu/Infodigest" style="color:#adb5bd">GitHub</a>
</footer>
<script>
// Discover available dates by listing docs/data/*.json via GitHub API
const BASE_RAW = 'https://raw.githubusercontent.com/royyiyangliu/Infodigest/main/docs/data/';
const INDEX_API = 'https://api.github.com/repos/royyiyangliu/Infodigest/contents/docs/data';

fetch(INDEX_API)
  .then(r => r.json())
  .then(files => {
    const dates = files
      .filter(f => /^\d{4}-\d{2}-\d{2}_summary\.json$/.test(f.name))
      .map(f => f.name.replace('_summary.json', ''))
      .sort((a, b) => b.localeCompare(a));  // newest first

    document.getElementById('loading').style.display = 'none';
    const ul = document.getElementById('list');
    if (dates.length === 0) {
      ul.innerHTML = '<li style="padding:18px 22px;color:#9ca3af">暂无数据</li>';
      return;
    }
    ul.innerHTML = dates.map(d =>
      `<li><a href="digest.html?date=${d}">
        <span class="date">${d}</span>
        <span class="arrow">›</span>
      </a></li>`
    ).join('');
  })
  .catch(() => {
    document.getElementById('loading').textContent = '加载失败，请刷新重试。';
  });
</script>
</body>
</html>
